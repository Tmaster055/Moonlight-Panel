<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Konsole - {{ server_name }}</title>
  <link rel="icon" href="{{ url_for('static', filename='icon.svg') }}" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">Konsole: {{ server_name }}</h2>
    <a href="{{ url_for('index') }}" class="btn btn-outline-light">Zurück</a>
  </div>

  {% if error %}
  <div id="consoleError" class="alert alert-warning">{{ error }}</div>
  {% else %}
  <div id="consoleError" class="alert alert-warning" style="display:none;"></div>
  {% endif %}

  <div class="d-flex gap-2 mb-3">
    <button id="refreshLogsBtn" class="btn btn-sm btn-outline-light">Aktualisieren</button>
    <span class="text-muted small align-self-center">Nur Lesen - keine Befehle</span>
  </div>

  <div class="card bg-dark text-light border-secondary">
    <div class="card-header">Server-Logs</div>
    <div class="card-body p-0">
      <pre id="consoleOutput" class="console-output">{{ initial_logs if initial_logs else 'Noch keine Logs verfugbar.' }}</pre>
    </div>
  </div>
</div>

<script>
  (function () {
    var outputEl = document.getElementById('consoleOutput');
    var errorEl = document.getElementById('consoleError');
    var refreshBtn = document.getElementById('refreshLogsBtn');
    var REFRESH_MS = 2500;
    var intervalId = null;

    function setError(message) {
      if (!message) {
        errorEl.style.display = 'none';
        errorEl.textContent = '';
        return;
      }
      errorEl.style.display = 'block';
      errorEl.textContent = message;
    }

    function updateLogs() {
      fetch('{{ url_for("server_logs", name=server_name) }}')
        .then(function (resp) {
          return resp.json().then(function (json) {
            return { ok: resp.ok, body: json };
          });
        })
        .then(function (res) {
          if (!res.ok) {
            setError(res.body.message || 'Fehler beim Laden der Logs.');
            return;
          }
          setError('');
          var text = (res.body && res.body.logs) ? res.body.logs : 'Noch keine Logs verfugbar.';
          outputEl.textContent = text;
          outputEl.scrollTop = outputEl.scrollHeight;
        })
        .catch(function (err) {
          setError(err.message || String(err));
        });
    }

    refreshBtn.addEventListener('click', updateLogs);
    updateLogs();
    intervalId = setInterval(updateLogs, REFRESH_MS);

    window.addEventListener('beforeunload', function () {
      if (intervalId) {
        clearInterval(intervalId);
      }
    });
  })();
</script>
</body>
</html>
